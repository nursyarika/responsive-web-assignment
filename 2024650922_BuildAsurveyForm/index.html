<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Student Feedback Survey</h1>

<p id="description">
  Please fill in this form to help us improve our services and events.
</p>

<form id="survey-form">

  <label id="name-label" for="name">Full Name</label>
  <input type="text" id="name" placeholder="Enter your full name" required>

  <label id="email-label" for="email">Email Address</label>
  <input type="email" id="email" placeholder="Enter your email" required>

  <label id="number-label" for="number">Age</label>
  <input type="number" id="number" placeholder="Enter your age"
         min="10" max="60" required>

  <label>Which event are you interested in?</label>
  <select id="dropdown">
    <option value="seminar">Seminar</option>
    <option value="workshop">Workshop</option>
  </select>

  <label>Do you enjoy attending events?</label>
  <input type="radio" name="enjoy" value="yes"> Yes
  <input type="radio" name="enjoy" value="no"> No

  <label>What do you prefer?</label>
  <input type="checkbox" value="online"> Online Events<br>
  <input type="checkbox" value="physical"> Physical Events<br>

  <label>Additional Comments</label>
  <textarea rows="4" placeholder="Write your comments here..."></textarea>

  <button type="submit" id="submit">Submit</button>

</form>
  </body>
</html>
