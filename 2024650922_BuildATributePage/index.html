<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tribute Page</title>
  <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <main id="main">

  <h1 id="title">Nikola Tesla</h1>

  <figure id="img-div">
    <img id="image" src="https://upload.wikimedia.org/wikipedia/commons/d/d4/N.Tesla.JPG" alt="Nikola Tesla portrait">
    <figcaption id="img-caption">
      Nikola Tesla, inventor and electrical engineer who pioneered AC electricity.
    </figcaption>
  </figure>

  <section id="tribute-info">
    Nikola Tesla was a visionary inventor known for his contributions to alternating current (AC) power systems,
    wireless communication, and electrical engineering. His ideas shaped modern electricity distribution and technology.
  </section>

  <a id="tribute-link"
     href="https://en.wikipedia.org/wiki/Nikola_Tesla"
     target="_blank">
     Learn more about Nikola Tesla
  </a>

</main>
